<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seattle → Bellingham 3D Map</title>

  <!-- MapLibre GL JS – free, no API key needed -->
  <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4.5.0/dist/maplibre-gl.js"></script>
  <link  href="https://cdn.jsdelivr.net/npm/maplibre-gl@4.5.0/dist/maplibre-gl.css" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0e1a;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── title bar ── */
    header {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(10,14,26,0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 40px;
      padding: 10px 28px;
      color: #fff;
      font-size: 15px;
      letter-spacing: 0.04em;
      white-space: nowrap;
      pointer-events: none;
    }
    header .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px #4ade80;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(1.4); }
    }

    /* ── map container ── */
    #map {
      width: 100vw;
      height: 100vh;
    }

    /* ── status pill ── */
    #status {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(10,14,26,0.82);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 40px;
      padding: 9px 24px;
      color: #fff;
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    /* ── speed control ── */
    #controls {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 10px;
    }
    #controls button {
      background: rgba(10,14,26,0.82);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.18);
      color: #fff;
      font-size: 13px;
      padding: 7px 18px;
      border-radius: 40px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      letter-spacing: 0.04em;
    }
    #controls button:hover,
    #controls button.active {
      background: rgba(74,222,128,0.2);
      border-color: #4ade80;
      color: #4ade80;
    }

    /* hide MapLibre attribution a bit */
    .maplibregl-ctrl-attrib { font-size: 10px !important; opacity: 0.5; }
  </style>
</head>
<body>

  <header>
    <span class="dot"></span>
    Seattle &nbsp;→&nbsp; Bellingham &nbsp;·&nbsp; 3D Route
  </header>

  <div id="map"></div>

  <div id="controls">
    <button id="btnSlow"   onclick="setSpeed('slow')">Langzaam</button>
    <button id="btnNormal" onclick="setSpeed('normal')" class="active">Normaal</button>
    <button id="btnFast"   onclick="setSpeed('fast')">Snel</button>
  </div>

  <div id="status">Vertrekken vanuit Seattle…</div>

<script>
/* ─────────────────────────────────────────────
   CONFIG
───────────────────────────────────────────── */
const SEATTLE    = { lng: -122.332, lat: 47.606, zoom: 11.5, bearing:  15, pitch: 52 };
const BELLINGHAM = { lng: -122.479, lat: 48.752, zoom: 11.5, bearing: -10, pitch: 55 };
const MIDPOINT   = { lng: -122.395, lat: 48.18,  zoom:  9.2, bearing:   5, pitch: 62 };

// Duration in ms for each leg (changed by speed buttons)
let speeds = { slow: 14000, normal: 9000, fast: 4500 };
let currentSpeed = 'normal';

const legDuration = () => speeds[currentSpeed];

/* ─────────────────────────────────────────────
   MAP INIT  (OpenFreeMap – no key required)
───────────────────────────────────────────── */
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.openfreemap.org/styles/positron',
  center: [SEATTLE.lng, SEATTLE.lat],
  zoom: SEATTLE.zoom,
  pitch: SEATTLE.pitch,
  bearing: SEATTLE.bearing,
  antialias: true,
});

map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), 'top-right');

/* ─────────────────────────────────────────────
   MARKERS
───────────────────────────────────────────── */
function makeMarker(color, label) {
  const el = document.createElement('div');
  el.style.cssText = `
    width: 38px; height: 38px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    background: ${color};
    border: 3px solid #fff;
    box-shadow: 0 2px 16px ${color}88;
    cursor: default;
  `;
  // inner label
  const inner = document.createElement('div');
  inner.style.cssText = `
    position: absolute;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    transform: rotate(45deg);
    color: #fff; font-weight: 700; font-size: 11px;
    font-family: 'Segoe UI', sans-serif;
  `;
  inner.textContent = label;
  el.appendChild(inner);
  return el;
}

// Seattle marker
new maplibregl.Marker({ element: makeMarker('#3b82f6', 'SEA') })
  .setLngLat([SEATTLE.lng, SEATTLE.lat])
  .setPopup(new maplibregl.Popup({ offset: 30 }).setHTML('<strong>Seattle, WA</strong><br>47.6062° N, 122.3321° W'))
  .addTo(map);

// Bellingham marker
new maplibregl.Marker({ element: makeMarker('#f97316', 'BHM') })
  .setLngLat([BELLINGHAM.lng, BELLINGHAM.lat])
  .setPopup(new maplibregl.Popup({ offset: 30 }).setHTML('<strong>Bellingham, WA</strong><br>48.7519° N, 122.4787° W'))
  .addTo(map);

/* ─────────────────────────────────────────────
   ROUTE LINE  (added after map loads)
───────────────────────────────────────────── */
map.on('load', () => {

  // Draw route
  map.addSource('route', {
    type: 'geojson',
    data: {
      type: 'Feature',
      geometry: {
        type: 'LineString',
        coordinates: [
          [-122.332, 47.606],
          [-122.355, 47.72],
          [-122.370, 47.84],
          [-122.385, 47.97],
          [-122.400, 48.10],
          [-122.420, 48.26],
          [-122.445, 48.42],
          [-122.460, 48.57],
          [-122.470, 48.66],
          [-122.479, 48.752],
        ]
      }
    }
  });

  // Glow layer (wide, semi-transparent)
  map.addLayer({
    id: 'route-glow',
    type: 'line',
    source: 'route',
    layout: { 'line-join': 'round', 'line-cap': 'round' },
    paint: {
      'line-color': '#4ade80',
      'line-width': 10,
      'line-opacity': 0.25,
      'line-blur': 4,
    }
  });

  // Core line
  map.addLayer({
    id: 'route-line',
    type: 'line',
    source: 'route',
    layout: { 'line-join': 'round', 'line-cap': 'round' },
    paint: {
      'line-color': '#4ade80',
      'line-width': 3,
      'line-opacity': 0.9,
      'line-dasharray': [2, 1.5],
    }
  });

  // Animated dashes: shift dash offset to fake movement
  let dashOffset = 0;
  function animateDash() {
    dashOffset = (dashOffset - 0.05 + 10) % 10;
    map.setPaintProperty('route-line', 'line-dasharray', [2, 1.5]);
    requestAnimationFrame(animateDash);
  }
  animateDash();

  // Start camera animation
  setTimeout(startTour, 1000);
});

/* ─────────────────────────────────────────────
   CAMERA TOUR
───────────────────────────────────────────── */
const statusEl = document.getElementById('status');
let tourActive = true;

function flyTo(opts, onDone) {
  map.flyTo({
    center:   [opts.lng, opts.lat],
    zoom:     opts.zoom,
    bearing:  opts.bearing,
    pitch:    opts.pitch,
    speed:    0.6,
    curve:    1.4,
    duration: legDuration(),
    essential: true,
  });
  map.once('moveend', onDone);
}

function startTour() {
  if (!tourActive) return;

  // Leg 1: Seattle → midpoint
  statusEl.textContent = '🛣  Rijdend van Seattle naar Bellingham…';
  flyTo(MIDPOINT, () => {
    // Leg 2: midpoint → Bellingham
    flyTo(BELLINGHAM, () => {
      statusEl.textContent = '📍 Aangekomen in Bellingham';
      setTimeout(() => {
        if (!tourActive) return;
        // Leg 3: Bellingham → midpoint (return)
        statusEl.textContent = '↩  Terugrijden naar Seattle…';
        flyTo({ ...MIDPOINT, bearing: -5 }, () => {
          // Leg 4: midpoint → Seattle
          flyTo(SEATTLE, () => {
            statusEl.textContent = '🏙  Terug in Seattle';
            setTimeout(() => {
              if (tourActive) startTour(); // loop
            }, 2500);
          });
        });
      }, 3000);
    });
  });
}

/* ─────────────────────────────────────────────
   SPEED CONTROL
───────────────────────────────────────────── */
function setSpeed(s) {
  currentSpeed = s;
  document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn' + s.charAt(0).toUpperCase() + s.slice(1)).classList.add('active');
}
</script>
</body>
</html>
